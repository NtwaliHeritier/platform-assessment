grafana:
  enabled: true

  admin:
    existingSecret: grafana-admin-credentials
    userKey: admin-user
    passwordKey: admin-password

  service:
    type: ClusterIP

  persistence:
    enabled: false

  sidecar:
    dashboards:
      enabled: true
    datasources:
      enabled: true

  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://host.docker.internal:3100
      isDefault: false