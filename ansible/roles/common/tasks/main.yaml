- name: Ensure sudo is installed
  ansible.builtin.apt:
    name: sudo
    state: present
    update_cache: yes

- name: Create deploy user
  ansible.builtin.user:
    name: deploy
    comment: Non-root deploy user
    shell: /bin/bash
    groups: sudo
    append: true
    create_home: yes

- name: Disable root SSH login
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PermitRootLogin'
    line: 'PermitRootLogin no'
  notify: restart ssh

- name: Install firewall packages
  ansible.builtin.apt:
    name:
      - ufw
      - iptables
    state: present

- name: Set default incoming firewall policy
  community.general.ufw:
    direction: incoming
    policy: deny

- name: Set default outgoing firewall policy
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: Allow SSH through firewall
  community.general.ufw:
    rule: allow
    name: OpenSSH

- name: Enable UFW
  community.general.ufw:
    state: enabled

- name: Ensure tzdata is installed (timezone database)
  ansible.builtin.apt:
    name: tzdata
    state: present
    update_cache: yes

- name: Set timezone to Etc/UTC
  community.general.timezone:
    name: Etc/UTC

- name: Set system limits
  ansible.builtin.copy:
    dest: /etc/security/limits.d/99-custom.conf
    content: |
      * soft nofile 65535
      * hard nofile 65535

- name: Ensure unattended upgrades installed
  ansible.builtin.apt:
    name: unattended-upgrades
    state: present