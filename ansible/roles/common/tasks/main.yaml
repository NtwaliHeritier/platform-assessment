- name: Ensure sudo is installed
  apt:
    name: sudo
    state: present
    update_cache: yes

- name: Create deploy user
  user:
    name: deploy
    comment: "Non-root deploy user"
    shell: /bin/bash
    groups: sudo
    create_home: yes

- name: Disable root SSH login
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PermitRootLogin'
    line: 'PermitRootLogin no'
  notify: restart ssh

- name: Configure UFW default policies
  ufw:
    state: enabled
    policy: deny
    direction: incoming

- name: Allow SSH
  ufw:
    rule: allow
    name: OpenSSH

- name: Set timezone
  timezone:
    name: UTC

- name: Set system limits
  copy:
    dest: /etc/security/limits.d/99-custom.conf
    content: |
      * soft nofile 65535
      * hard nofile 65535

- name: Ensure unattended-upgrades installed
  apt:
    name: unattended-upgrades
    state: present